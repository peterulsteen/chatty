name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python and uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('app/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Install dependencies
        working-directory: app
        run: uv sync

      - name: Run pre-commit
        run: uv --project app run pre-commit run --all-files

      - name: Run tests
        working-directory: app
        run: uv run pytest -W ignore

  terraform-security:
    runs-on: ubuntu-latest
    # Runs in parallel with ci — Terraform linting and scanning are independent
    # of Python tests. Both jobs must pass before merging.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.55.0

      - name: Cache TFLint plugins
        uses: actions/cache@v4
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ runner.os }}-${{ hashFiles('terraform/.tflint.hcl') }}

      - name: TFLint — init plugins
        working-directory: terraform
        run: tflint --init

      - name: TFLint — lint all modules and environments
        working-directory: terraform
        run: tflint --recursive --minimum-failure-severity=error

      - name: Trivy — IaC security scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: terraform
          exit-code: "1"
          severity: HIGH,CRITICAL

  smoke-test:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python and uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('app/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        working-directory: app
        run: uv sync

      - name: Build and start stack
        run: docker compose up -d --wait

      - name: Run smoke tests
        working-directory: app
        run: uv run pytest tests_smoke/ -v -W ignore

      - name: Tear down stack
        if: always()
        run: docker compose down -v
