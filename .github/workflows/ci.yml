name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python and uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          python-version: "3.11"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('app/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "~1.9"

      - name: Install dependencies
        working-directory: app
        run: uv sync

      - name: Run pre-commit
        run: uv --project app run pre-commit run --all-files

      - name: Audit dependencies
        working-directory: app
        run: uv run pip-audit

      - name: Run tests
        working-directory: app
        run: uv run pytest -W ignore

  terraform-security:
    runs-on: ubuntu-latest
    # Runs in parallel with ci — Terraform linting and scanning are independent
    # of Python tests. Both jobs must pass before merging.

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "~1.9"

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4
        with:
          tflint_version: v0.55.0

      - name: Cache TFLint plugins
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ runner.os }}-${{ hashFiles('terraform/.tflint.hcl') }}

      - name: TFLint — init plugins
        working-directory: terraform
        run: tflint --init

      - name: TFLint — lint all modules and environments
        working-directory: terraform
        run: tflint --recursive --minimum-failure-severity=error

      - name: Trivy — IaC security scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: config
          scan-ref: terraform
          exit-code: "1"
          severity: HIGH,CRITICAL

  smoke-test:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python and uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          python-version: "3.11"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('app/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        working-directory: app
        run: uv sync

      - name: Build image
        run: docker build -t chatty:latest .

      - name: Trivy — scan image for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: image
          image-ref: chatty:latest
          exit-code: "1"
          severity: HIGH,CRITICAL
          # Suppress findings with no fix yet (OS packages awaiting upstream patch).
          ignore-unfixed: true

      - name: Start stack
        run: docker compose up -d --wait

      - name: Run smoke tests
        working-directory: app
        run: uv run pytest tests_smoke/ -v -W ignore

      - name: Tear down stack
        if: always()
        run: docker compose down -v
